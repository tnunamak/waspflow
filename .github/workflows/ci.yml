name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq tmux jq

      - name: verify.sh
        run: bash scripts/verify.sh
