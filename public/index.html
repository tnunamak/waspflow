<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Waspflow Federation</title>
    <style>
      :root { color-scheme: light; font-family: ui-sans-serif, system-ui, sans-serif; color: #19251f; background: #f6f8f4; }
      * { box-sizing: border-box; }
      body { margin: 0; }
      main { width: min(720px, calc(100% - 32px)); margin: 40px auto 72px; }
      header { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 28px; }
      h1 { margin: 0; font-size: clamp(1.65rem, 4vw, 2.25rem); letter-spacing: -.04em; }
      h2 { margin-top: 0; font-size: 1.2rem; }
      p { line-height: 1.5; }
      .card, details { background: #fff; border: 1px solid #dce4dc; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(25, 37, 31, .05); }
      details { margin-top: 16px; }
      summary { cursor: pointer; font-weight: 700; }
      details > :not(summary) { margin-top: 18px; }
      .eyebrow { color: #486052; font-weight: 700; font-size: .84rem; letter-spacing: .04em; text-transform: uppercase; }
      .status { font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 750; letter-spacing: -.06em; margin: 8px 0; }
      .status[data-state="contributing"] { color: #146c43; }
      .status[data-state="paused"], .status[data-state="idle"] { color: #625a27; }
      .status[data-state="action_needed"] { color: #a34318; }
      .status[data-state="setup_required"] { color: #a34318; }
      .badge { border-radius: 999px; display: inline-block; padding: 5px 10px; background: #e7f4eb; color: #146c43; font-size: .86rem; font-weight: 700; }
      label { display: block; margin: 18px 0 7px; font-weight: 700; }
      input, textarea { width: 100%; border: 1px solid #9dac9f; border-radius: 10px; padding: 12px; color: inherit; font: inherit; background: #fff; }
      textarea { min-height: 130px; resize: vertical; }
      button { border: 0; border-radius: 10px; padding: 12px 16px; background: #146c43; color: #fff; font: inherit; font-weight: 750; cursor: pointer; }
      button:hover { background: #0e5936; }
      button.secondary { background: #e7eee8; color: #1d3326; }
      button:disabled { opacity: .55; cursor: progress; }
      .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 22px; }
      .detail { white-space: pre-wrap; color: #486052; }
      .notice { margin-bottom: 16px; padding: 12px 14px; border-radius: 10px; background: #fff1e9; color: #8b3513; }
      .notice[hidden] { display: none; }
      .steps { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 6px; list-style: none; padding: 0; }
      .steps li { color: #718176; font-size: .85rem; text-align: center; }
      .steps li::before { content: ""; display: block; width: 12px; height: 12px; margin: 0 auto 6px; border-radius: 50%; background: #d9e1da; }
      .steps li.current, .steps li.complete { color: #146c43; font-weight: 700; }
      .steps li.complete::before, .steps li.current::before { background: #2d9e63; }
      .manual-steps { padding-left: 1.35rem; line-height: 1.55; }
      code { padding: 2px 5px; border-radius: 4px; background: #edf2ed; color: #1d3326; overflow-wrap: anywhere; }
      .muted { color: #58695e; }
      @media (max-width: 480px) { main { width: min(100% - 24px, 720px); margin-top: 24px; } .card, details { padding: 18px; } }
    </style>
  </head>
  <body>
    <main id="app" aria-live="polite">Loading Waspflow Federation…</main>
    <script>
      const app = document.createElement('script');
      app.type = 'module';
      app.src = `/app.mjs?token=${encodeURIComponent(new URLSearchParams(window.location.search).get('token') || '')}`;
      document.body.append(app);
    </script>
  </body>
</html>
